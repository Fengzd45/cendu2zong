<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>各公司最新植物报价单</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 10px; background-color: #f5f7fa; color: #333; }
        h2 { text-align: center; color: #2c3e50; font-size: 1.4rem; margin-bottom: 5px; }
        .update-time { text-align: center; font-size: 0.85rem; color: #7f8c8d; margin-bottom: 15px; }
        .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; font-size: 0.9rem; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background-color: #2ecc71; color: white; font-weight: bold; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9fbf9; }
        .price { font-weight: bold; color: #e74c3c; }
        .loading { text-align: center; padding: 30px; color: #95a5a6; font-size: 1rem; }
    </style>
</head>
<body>

    <h2>📊 植物供应报价实时看板</h2>
    <div class="update-time" id="sync-time">正在获取最新同步时间...</div>

    <div class="table-container">
        <div id="loading" class="loading">⏳ 正在努力加载最新的云端数据，请稍候...</div>
        <table id="quote-table" style="display: none;">
            <thead>
                <tr>
                    <th>供应商</th>
                    <th>类别</th>
                    <th>植物名称</th>
                    <th>规格(Size)</th>
                    <th>净价</th>
                    <th>采集时间</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- 数据由 JavaScript 动态写入 -->
            </tbody>
        </table>
    </div>

    <script>
        // 自动读取同仓库下的 quotes.json 文件，加时间戳防缓存
        fetch('quotes.json?t=' + new Date().getTime())
            .then(response => {
                if (!response.ok) throw new Error('未找到数据文件 quotes.json');
                return response.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                const table = document.getElementById('quote-table');
                const tbody = document.getElementById('table-body');
                
                if (data.length === 0) {
                    document.getElementById('loading').innerText = "📭 暂无报价数据";
                    document.getElementById('loading').style.display = 'block';
                    return;
                }

                // 更新网页上的最新同步时间（取第一条数据的同步时间）
                if(data[0].imported_at) {
                    document.getElementById('sync-time').innerText = "数据最后更新时间：" + data[0].imported_at;
                }

                // 循环把每一条报价写入表格
                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><b>${item.supplier || '-'}</b></td>
                        <td>${item.category || '-'}</td>
                        <td><i>${item.botanical_name || '-'}</i></td>
                        <td>${item.size || '-'}</td>
                        <td class="price">$${item.net_price || '0.00'}</td>
                        <td style="color:#999; font-size:0.8rem;">${item.imported_at || '-'}</td>
                    `;
                    tbody.appendChild(row);
                });

                table.style.display = 'table';
            })
            .catch(error => {
                console.error(error);
                document.getElementById('loading').innerText = "❌ 数据加载失败，请等待 Action 运行生成 quotes.json";
                document.getElementById('loading').style.color = "red";
            });
    </script>
</body>
</html>
