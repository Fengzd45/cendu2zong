name: Auto Parse Email Quotes

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动一键点击触发

# 🔐 使用独立的并发控制，不与爬虫冲突，不卡死
concurrency:
  group: email-parse-group
  cancel-in-progress: false

jobs:
  parse-and-db:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies for OCR
      # 关键：OCR 引擎在 Linux 虚拟机里运行必须依赖这些图形渲染库，否则会报 libGL.so.1 找不到的错误
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libgomp1 libglib2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装轻量级 OCR 引擎库和图片处理库
        pip install pandas openpyxl pdfplumber requests beautifulsoup4 pillow easyocr

    - name: Run Auto Email Parser
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.SENDER_APP_PASS }}
      run: python mail_to_db_pipeline.py

    - name: Commit and Push Database & JSON Updates
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        
        git add nursery_quotes.db quotes.json || true
        
        git diff-index --quiet HEAD || git commit -m "Auto-parse email with OCR and refresh dashboard"
        git push origin HEAD:main
