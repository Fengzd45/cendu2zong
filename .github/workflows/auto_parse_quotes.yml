name: Auto Parse Email Quotes

on:
  schedule:
    # 每天北京时间早上 10:00（UTC时间 2:00）自动拉取一次邮件
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许网页端手动一键点击触发

# 🔐 添加防锁冲突控制：让同一组的数据库写入操作排队执行
concurrency:
  group: db-update-group
  cancel-in-progress: false

jobs:
  parse-and-db:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies for PaddleOCR
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libgomp1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install paddlepaddle paddleocr pdfplumber pandas openpyxl requests beautifulsoup4

    - name: Run Auto Email Parser
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.SENDER_APP_PASS }}
      run: python mail_to_db_pipeline.py

    - name: Commit and Push Database & JSON Updates
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        
        git add nursery_quotes.db quotes.json || true
        
        git diff-index --quiet HEAD || git commit -m "Auto-parse email and refresh dashboard JSON"
        git push origin HEAD:main
