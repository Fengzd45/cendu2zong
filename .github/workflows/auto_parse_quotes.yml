Name: Hourly Auto Parse & Update Nursery DB

on:
  schedule:
    # 每天北京时间早上 10:00（UTC时间 2:00）自动拉取一次邮件
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许网页端手动一键点击触发

# 🔐 添加防锁冲突控制：让同一组的数据库写入操作排队执行
concurrency:
  group: db-update-group
  cancel-in-progress: false

jobs:
  parse-and-db:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies for PaddleOCR
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libgomp1

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install paddlepaddle paddleocr pdfplumber pandas openpyxl

    - name: Run Auto Mail Parser
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
      run: python mail_to_db_pipeline.py

    - name: Commit and Push Database & JSON Updates
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        
        # 【关键修改：让 Git 同时跟踪 .db 数据库文件和同步生成的 .json 静态看板数据】
        git add nursery_quotes.db quotes.json || true
        
        # 如果文件有变化，则自动提交并推送到仓库
        git diff-index --quiet HEAD || git commit -m "Auto-import quotes and refresh dashboard JSON [skip ci]"
        git push || echo "No changes to push."
